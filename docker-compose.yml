services:
  server:
    build:
      context: .
      target: base
    ports:
      - "3001:3001"
    volumes:
      - ./packages/server/src:/app/packages/server/src
      - ./packages/shared/src:/app/packages/shared/src
      - ./tsconfig.base.json:/app/tsconfig.base.json
    environment:
      NODE_ENV: development
      PORT: "3001"
    command: npm run dev -w @tgperekup/server

  client:
    build:
      context: .
      target: base
    ports:
      - "5173:5173"
    volumes:
      - ./packages/client:/app/packages/client
      - ./packages/shared:/app/packages/shared
      - ./tsconfig.base.json:/app/tsconfig.base.json
    environment:
      NODE_ENV: development
    command: npm run dev -w @tgperekup/client
    depends_on:
      - server
